<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nossa História Cinemática</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<audio id="music" src="assets/musica.mp3" loop></audio>
<canvas id="canvas"></canvas>

<!-- TELA INICIAL -->
<div id="startScreen" class="active start-screen">
  <h1>Nossa História ❤️</h1>
  <button onclick="startExperience()">Começar</button>
</div>

<!-- CONTAINER DE SLIDES -->
<div id="slidesContainer" class="hidden">

  <!-- SLIDE 1 -->
  <div class="slide" id="slide1">
    <h1 id="typing"></h1>
    <div class="timer" id="timerTogether"></div>
    <button onclick="nextSlide()">Continuar</button>
  </div>

  <!-- SLIDE 2 -->
  <div class="slide" id="slide2">
    <div class="photo-container">
      <img src="assets/foto1.jpg" class="photo">
    </div>
    <h2 id="typing2"></h2>
    <button onclick="nextSlide()">Próximo</button>
  </div>

  <!-- SLIDE 3 -->
  <div class="slide" id="slide3">
    <div class="photo-container">
      <img src="assets/foto2.jpg" class="photo">
    </div>
    <h2 id="typing3"></h2>
    <button onclick="nextSlide()">Próximo</button>
  </div>

  <!-- SLIDE 4 -->
  <div class="slide" id="slide4">
    <div class="photo-container">
      <img src="assets/foto3.jpg" class="photo">
    </div>
    <h2 id="typing4"></h2>
    <button onclick="nextSlide()">Próximo</button>
  </div>

  <!-- SLIDE 5 -->
  <div class="slide" id="slide5">
    <div class="photo-container">
      <img src="assets/foto4.jpg" class="photo">
    </div>
    <h2 id="typing5"></h2>
    <button onclick="nextSlide()">Próximo</button>
  </div>

  <!-- SLIDE 6 -->
  <div class="slide" id="slide6">
    <div class="photo-container">
      <img src="assets/foto5.jpg" class="photo">
    </div>
    <h2 id="typing6"></h2>
    <button onclick="celebrate()">SIM ❤️</button>
  </div>

  <!-- SLIDE 7 -->
  <div class="slide" id="slide7">
    <h2>Nosso Tempo Juntos</h2>
    <div class="timer" id="timerTogetherSlide"></div>
    <div class="timer" id="timerHer"></div>
    <div class="timer" id="timerYou"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
