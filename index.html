<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nossa História ❤️</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="start-screen" id="startScreen">
  <button onclick="startExperience()">Começar ❤️</button>
</div>

<audio id="music" src="assets/musica.mp3" loop></audio>

<canvas id="canvas"></canvas>

<div class="container hidden" id="mainContent">

  <div class="slide active">
    <h1>Nossa História</h1>
    <p id="timer"></p>
  </div>

  <div class="slide">
    <div class="photo-container">
      <img src="assets/foto.jpg" class="photo">
    </div>
    <p>Desde aquele primeiro momento, algo era diferente...</p>
  </div>

  <div class="slide">
    <h2>Linha do Tempo</h2>
    <ul class="timeline">
      <li><span>💬</span> Primeiro "oi"</li>
      <li><span>😂</span> Primeira risada juntos</li>
      <li><span>❤️</span> Primeiro sentimento verdadeiro</li>
      <li><span>✨</span> Hoje, aqui...</li>
    </ul>
  </div>

  <div class="slide final">
    <h1>Quer namorar comigo?</h1>
    <div class="buttons">
      <button onclick="celebrate()">SIM ❤️</button>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
