<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nossa História</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="start-screen" id="startScreen">
  <button onclick="startExperience()">Começar nossa história ❤️</button>
</div>

<audio id="music" src="assets/musica.mp3"></audio>

<div class="container hidden" id="mainContent">
  <canvas id="bgCanvas"></canvas>

  <div class="slide active">
    <img src="assets/foto1.jpg" class="photo">
    <p class="typewriter" id="frase1"></p>
  </div>

  <div class="slide">
    <img src="assets/foto2.jpg" class="photo">
    <p class="typewriter" id="frase2"></p>
  </div>

  <div class="slide">
    <img src="assets/foto3.jpg" class="photo">
    <p class="typewriter" id="frase3"></p>
  </div>

  <div class="slide">
    <h2>Oficialmente juntos há:</h2>
    <div id="timer"></div>
  </div>

  <div class="slide final">
    <h1 id="mensagemFinal"></h1>
    <div class="buttons">
      <button class="sim" onclick="aceitou()">SIM ❤️</button>
      <button class="nao" id="naoBtn">NÃO</button>
    </div>
    <p id="respostaFinal"></p>
  </div>

</div>

<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
